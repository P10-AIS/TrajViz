services:
  client:
    build:
      context: ./client
      dockerfile: ./Dockerfile
    ports:
      - '8000:80'
    restart: unless-stopped
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/src/.env
    volumes:
      - /mnt/dataimputationgroup/Crate/Data:/app/server/Data
      - /mnt/dataimputationgroup/TRAIT/Predictions:/app/server/Predictions
